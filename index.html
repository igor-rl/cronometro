<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cronômetro">
<meta name="theme-color" content="#0b0d12">
<title>Cronômetro</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0b0d12;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    position: relative;
    height: 100vh;
    width: 100vw;
  }

  /* ── Widget genérico flutuante ── */
  .widget {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 3vmin;
    padding: 2vmin 3vmin;
    cursor: grab;
    touch-action: none;
    flex-wrap: nowrap;
  }

  .widget.dragging {
    cursor: grabbing;
  }

  /* ── Textos de display ── */
  .timer, .count-display {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: #f5f6fa;
    font-size: clamp(1rem, 9vmin, 3.2rem);
    letter-spacing: 0.01em;
    line-height: 1;
    white-space: nowrap;
    flex-shrink: 1;
    text-align: center;
    min-width: 2ch;
  }

  .ms {
    font-size: 0.45em;
    color: #7d8493;
    margin-left: 0.1em;
  }

  /* ── Botões ── */
  button {
    border: none;
    outline: none;
    cursor: pointer;
    background: #1b1f2a;
    color: #f5f6fa;
    border-radius: 50%;
    width: clamp(28px, 11vmin, 64px);
    height: clamp(28px, 11vmin, 64px);
    min-width: 28px;
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s ease, background 0.2s ease;
    box-shadow: 0 3px 10px rgba(0,0,0,0.35);
    flex-shrink: 0;
  }

  button:active { transform: scale(0.88); }

  button svg {
    width: 44%;
    height: 44%;
    fill: currentColor;
  }

  /* cronômetro */
  #startPause {
    background: #2ecc71;
    width: clamp(34px, 13vmin, 76px);
    height: clamp(34px, 13vmin, 76px);
  }

  #startPause.running { background: #e67e22; }

  #reset {
    background: #2a2f3d;
    color: #b9bfcd;
  }

  /* contador */
  #decrement {
    background: #2a2f3d;
    color: #b9bfcd;
  }

  #decrement.disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  #increment {
    background: #3498db;
    width: clamp(34px, 13vmin, 76px);
    height: clamp(34px, 13vmin, 76px);
  }
</style>
</head>
<body>

  <!-- Cronômetro -->
  <div class="widget" id="timerWidget">
    <button id="reset" aria-label="Reiniciar">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
    </button>
    <div class="timer" id="timerDisplay">00:00<span class="ms">.00</span></div>
    <button id="startPause" aria-label="Iniciar">
      <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>
  </div>

  <!-- Contador -->
  <div class="widget" id="counterWidget">
    <button id="decrement" class="disabled" aria-label="Diminuir">
      <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
    </button>
    <div class="count-display" id="countDisplay">0</div>
    <button id="increment" aria-label="Aumentar">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
  </div>

<script>
  // ── Utilitário ──
  function clamp(v, min, max) { return Math.min(Math.max(v, min), max); }

  // ── Drag para qualquer widget ──
  function makeDraggable(widget) {
    let dragging = false, ox = 0, oy = 0;

    widget.addEventListener('pointerdown', (e) => {
      if (e.target.closest('button')) return;
      dragging = true;
      widget.classList.add('dragging');
      const r = widget.getBoundingClientRect();
      ox = e.clientX - r.left;
      oy = e.clientY - r.top;
      widget.setPointerCapture(e.pointerId);
    });

    widget.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const r = widget.getBoundingClientRect();
      const maxL = window.innerWidth - r.width;
      const maxT = window.innerHeight - r.height;
      widget.style.left = clamp(e.clientX - ox, 0, Math.max(maxL, 0)) + 'px';
      widget.style.top  = clamp(e.clientY - oy, 0, Math.max(maxT, 0)) + 'px';
    });

    const stop = () => { dragging = false; widget.classList.remove('dragging'); };
    widget.addEventListener('pointerup', stop);
    widget.addEventListener('pointercancel', stop);
  }

  function centerWidget(widget, offsetY = 0) {
    // Força layout antes de medir
    requestAnimationFrame(() => {
      const r = widget.getBoundingClientRect();
      widget.style.left = ((window.innerWidth  - r.width)  / 2) + 'px';
      widget.style.top  = ((window.innerHeight - r.height) / 2 + offsetY) + 'px';
    });
  }

  function clampWidgetToScreen(widget) {
    const r = widget.getBoundingClientRect();
    widget.style.left = clamp(r.left, 0, Math.max(window.innerWidth  - r.width,  0)) + 'px';
    widget.style.top  = clamp(r.top,  0, Math.max(window.innerHeight - r.height, 0)) + 'px';
  }

  // ── Cronômetro ──
  let startTime = 0, elapsed = 0, running = false, rafId = null;

  const timerDisplay = document.getElementById('timerDisplay');
  const btnStartPause = document.getElementById('startPause');
  const iconPlay  = document.getElementById('iconPlay');
  const iconPause = document.getElementById('iconPause');
  const btnReset  = document.getElementById('reset');

  function format(ms) {
    const centis  = Math.floor(ms / 10) % 100;
    const seconds = Math.floor(ms / 1000) % 60;
    const minutes = Math.floor(ms / 60000);
    const pad = n => String(n).padStart(2, '0');
    return `${pad(minutes)}:${pad(seconds)}<span class="ms">.${pad(centis)}</span>`;
  }

  function tick() {
    timerDisplay.innerHTML = format(elapsed + (performance.now() - startTime));
    rafId = requestAnimationFrame(tick);
  }

  function startTimer() {
    running = true;
    startTime = performance.now();
    rafId = requestAnimationFrame(tick);
    btnStartPause.classList.add('running');
    iconPlay.style.display = 'none';
    iconPause.style.display = '';
  }

  function pauseTimer() {
    running = false;
    cancelAnimationFrame(rafId);
    elapsed += performance.now() - startTime;
    btnStartPause.classList.remove('running');
    iconPlay.style.display = '';
    iconPause.style.display = 'none';
  }

  function resetTimer() {
    pauseTimer();
    elapsed = 0;
    timerDisplay.innerHTML = format(0);
  }

  btnStartPause.addEventListener('click', () => running ? pauseTimer() : startTimer());
  btnReset.addEventListener('click', resetTimer);

  // ── Contador ──
  let count = 0;
  const countDisplay = document.getElementById('countDisplay');
  const btnDecrement = document.getElementById('decrement');
  const btnIncrement = document.getElementById('increment');

  function updateCount(val) {
    count = Math.max(0, val);
    countDisplay.textContent = count;
    btnDecrement.classList.toggle('disabled', count === 0);
  }

  btnIncrement.addEventListener('click', () => updateCount(count + 1));
  btnDecrement.addEventListener('click', () => updateCount(count - 1));

  // ── Inicializar widgets ──
  const timerWidget   = document.getElementById('timerWidget');
  const counterWidget = document.getElementById('counterWidget');

  makeDraggable(timerWidget);
  makeDraggable(counterWidget);

  // Centraliza os dois levemente separados (timer acima, contador abaixo)
  centerWidget(timerWidget,  -40);
  centerWidget(counterWidget, 40);

  window.addEventListener('resize', () => {
    clampWidgetToScreen(timerWidget);
    clampWidgetToScreen(counterWidget);
  });

  document.addEventListener('dblclick', e => e.preventDefault());
</script>
</body>
</html>
