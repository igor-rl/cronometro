<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cronômetro</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0b0d12;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    padding: 2vmin 3vmin;
  }

  .bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3vmin;
    width: 100%;
    flex-wrap: nowrap;
  }

  .timer {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: #f5f6fa;
    font-size: clamp(1rem, 9vmin, 3.2rem);
    letter-spacing: 0.01em;
    line-height: 1;
    white-space: nowrap;
    flex-shrink: 1;
  }

  .ms {
    font-size: 0.45em;
    color: #7d8493;
    margin-left: 0.1em;
  }

  button {
    border: none;
    outline: none;
    cursor: pointer;
    background: #1b1f2a;
    color: #f5f6fa;
    border-radius: 50%;
    width: clamp(28px, 11vmin, 64px);
    height: clamp(28px, 11vmin, 64px);
    min-width: 28px;
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s ease, background 0.2s ease;
    box-shadow: 0 3px 10px rgba(0,0,0,0.35);
    flex-shrink: 0;
  }

  button:active {
    transform: scale(0.88);
  }

  button svg {
    width: 44%;
    height: 44%;
    fill: currentColor;
  }

  #startPause {
    background: #2ecc71;
    width: clamp(34px, 13vmin, 76px);
    height: clamp(34px, 13vmin, 76px);
  }

  #startPause.running {
    background: #e67e22;
  }

  #reset {
    background: #2a2f3d;
    color: #b9bfcd;
  }

  #openWindow {
    position: fixed;
    top: 1.5vmin;
    right: 1.5vmin;
    width: clamp(24px, 6vmin, 36px);
    height: clamp(24px, 6vmin, 36px);
    background: #1b1f2a;
    color: #7d8493;
    opacity: 0.7;
    box-shadow: none;
  }

  #openWindow svg {
    width: 50%;
    height: 50%;
  }
</style>
</head>
<body>

  <button id="openWindow" aria-label="Abrir em nova janela" title="Abrir em nova janela">
    <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3z"/></svg>
  </button>

  <div class="bar">
    <button id="reset" aria-label="Reiniciar">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
    </button>

    <div class="timer" id="display">00:00<span class="ms">.00</span></div>

    <button id="startPause" aria-label="Iniciar">
      <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>
  </div>

<script>
  let startTime = 0;
  let elapsed = 0;
  let running = false;
  let rafId = null;

  const display = document.getElementById('display');
  const btnStartPause = document.getElementById('startPause');
  const iconPlay = document.getElementById('iconPlay');
  const iconPause = document.getElementById('iconPause');
  const btnReset = document.getElementById('reset');

  function format(ms) {
    const totalCentis = Math.floor(ms / 10);
    const centis = totalCentis % 100;
    const totalSeconds = Math.floor(ms / 1000);
    const seconds = totalSeconds % 60;
    const minutes = Math.floor(totalSeconds / 60);
    const pad = (n, l = 2) => String(n).padStart(l, '0');
    return `${pad(minutes)}:${pad(seconds)}<span class="ms">.${pad(centis)}</span>`;
  }

  function tick() {
    const now = performance.now();
    const current = elapsed + (now - startTime);
    display.innerHTML = format(current);
    rafId = requestAnimationFrame(tick);
  }

  function start() {
    running = true;
    startTime = performance.now();
    rafId = requestAnimationFrame(tick);
    btnStartPause.classList.add('running');
    iconPlay.style.display = 'none';
    iconPause.style.display = '';
    btnStartPause.setAttribute('aria-label', 'Pausar');
  }

  function pause() {
    running = false;
    cancelAnimationFrame(rafId);
    elapsed += performance.now() - startTime;
    btnStartPause.classList.remove('running');
    iconPlay.style.display = '';
    iconPause.style.display = 'none';
    btnStartPause.setAttribute('aria-label', 'Iniciar');
  }

  function reset() {
    running = false;
    cancelAnimationFrame(rafId);
    elapsed = 0;
    display.innerHTML = format(0);
    btnStartPause.classList.remove('running');
    iconPlay.style.display = '';
    iconPause.style.display = 'none';
    btnStartPause.setAttribute('aria-label', 'Iniciar');
  }

  btnStartPause.addEventListener('click', () => {
    if (running) pause(); else start();
  });

  btnReset.addEventListener('click', reset);

  document.getElementById('openWindow').addEventListener('click', () => {
    window.open(window.location.href, '_blank');
  });

  document.addEventListener('dblclick', e => e.preventDefault());
</script>
</body>
</html>
